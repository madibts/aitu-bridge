name: NPM Publish

on:
  workflow_run:
    workflows: ["Canary Release", "Stable release"]
    types: [completed]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v2
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      - run: npm ci
      - run: npm run build -- --define VERSION=${GITHUB_REF_NAME#v}
      - uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: dist
      # - run: npm publish --access public
      #   env:
      #     NODE_AUTH_TOKEN: ${{secrets.npm_token}}
